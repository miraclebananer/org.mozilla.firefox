app-id: org.mozilla.firefox
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: firefox
finish-args:
  # Display and graphics
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --socket=cups
  
  # Audio
  - --socket=pulseaudio
  
  # Network
  - --share=network
  
  # File access
  - --filesystem=xdg-download:rw
  - --filesystem=xdg-documents:ro
  - --filesystem=xdg-pictures:ro
  - --filesystem=xdg-videos:ro
  - --filesystem=xdg-music:ro
  
  # D-Bus access
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.gtk.vfs.*
  - --talk-name=org.a11y.Bus
  
  # System D-Bus
  - --system-talk-name=org.freedesktop.NetworkManager
  
  # Hardware access for WebGL, webcam, etc.
  - --device=all
  
  # Allow MPRIS media controls
  - --own-name=org.mpris.MediaPlayer2.firefox.*
  
  # Browser integration
  - --own-name=org.mozilla.firefox.*
  - --own-name=org.mozilla.firefox_beta.*
  
  # Environment variables
  - --env=MOZ_ENABLE_WAYLAND=1
  - --env=GTK_USE_PORTAL=1

modules:
  - name: firefox
    buildsystem: simple
    build-commands:
      # Firefox is already extracted by flatpak-builder
      # Install Firefox to /app
      - mkdir -p /app/lib/firefox
      - cp -r * /app/lib/firefox/
      
      # Create wrapper script
      - mkdir -p /app/bin
      - |
        cat > /app/bin/firefox << 'EOF'
        #!/bin/sh
        export BAMF_DESKTOP_FILE_HINT=/app/share/applications/org.mozilla.firefox.desktop
        exec /app/lib/firefox/firefox "$@"
        EOF
      - chmod +x /app/bin/firefox
      
      # Install desktop file
      - install -Dm644 org.mozilla.firefox.desktop /app/share/applications/org.mozilla.firefox.desktop
      
      # Install metainfo
      - install -Dm644 org.mozilla.firefox.metainfo.xml /app/share/metainfo/org.mozilla.firefox.metainfo.xml
      
      # Install icons (from installed location)
      - install -Dm644 /app/lib/firefox/browser/chrome/icons/default/default16.png /app/share/icons/hicolor/16x16/apps/org.mozilla.firefox.png
      - install -Dm644 /app/lib/firefox/browser/chrome/icons/default/default32.png /app/share/icons/hicolor/32x32/apps/org.mozilla.firefox.png
      - install -Dm644 /app/lib/firefox/browser/chrome/icons/default/default48.png /app/share/icons/hicolor/48x48/apps/org.mozilla.firefox.png
      - install -Dm644 /app/lib/firefox/browser/chrome/icons/default/default64.png /app/share/icons/hicolor/64x64/apps/org.mozilla.firefox.png
      - install -Dm644 /app/lib/firefox/browser/chrome/icons/default/default128.png /app/share/icons/hicolor/128x128/apps/org.mozilla.firefox.png
      
    sources:
      - type: archive
        url: https://download-installer.cdn.mozilla.net/pub/firefox/releases/151.0.2/linux-x86_64/en-US/firefox-151.0.2.tar.xz
        sha256: 1f77a1aacc2a0ccbb36998875f04a9c22229103dc35cb4bbb89784f0809161e0
        dest-filename: firefox-151.0.2.tar.xz
      
      - type: file
        path: org.mozilla.firefox.desktop
      
      - type: file
        path: org.mozilla.firefox.metainfo.xml
